include: ".ci/dockerfile-hash.yaml"

variables:
  DOCKER_REPO: "us-central1-docker.pkg.dev/aquareum-tv/streamplace/build"

build-bunny:
  stage: build
  interruptible: true
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  timeout: 2 hours
  script:
    - mkdir -p /kaniko/.docker
    - cp "$DOCKER_AUTH_CONFIG" /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/docker"
      --dockerfile "${CI_PROJECT_DIR}/docker/bunny.Dockerfile"
      --destination "$DOCKER_REPO:bunny"

builder:
  stage: build
  interruptible: true
  allow_failure: true
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  variables:
    FQ_IMAGE_NAME: "$DOCKER_REPO:builder-$DOCKERFILE_HASH"
    TARGET: builder
  timeout: 2 hours
  script:
    - mkdir -p /kaniko/.docker
    - cp "$DOCKER_AUTH_CONFIG" /kaniko/.docker/config.json
    - /kaniko/executor
      --build-arg TARGETARCH=amd64
      --build-arg DOCKERFILE_HASH=$DOCKERFILE_HASH
      --cache=true
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/build.Dockerfile"
      --destination "$FQ_IMAGE_NAME"
      --target "$TARGET"

builder-rebuild:
  tags:
    - tiny-job
  stage: build
  allow_failure: true
  interruptible: true
  image:
    name: curlimages/curl:latest
    entrypoint: [""]
  needs:
    - job: builder
  timeout: 2 hours
  script:
    - echo "CI_PIPELINE_ID=$CI_PIPELINE_ID"
    - echo "CI_PIPELINE_ID=$CI_PIPELINE_IID"
    - echo "CI_PROJECT_ID=$CI_PROJECT_ID"
    - >
      curl
      --data-raw '{"project_id": "'$CI_PROJECT_ID'", "pipeline_id": "'$CI_PIPELINE_ID'", "job_token": "'$CI_JOB_TOKEN'"}'
      --fail-with-body
      https://retry-gitlab.iameli.workers.dev/

.build:
  stage: build
  interruptible: true
  image: "$DOCKER_REPO:builder-$DOCKERFILE_HASH"
  timeout: 2 hours
  script:
    - rm -rf /usr/x86_64-w64-mingw32/include/d3dcompiler.h /usr/share/mingw-w64/include/d3dcompiler.h /usr/lib/gcc/x86_64-w64-mingw32/10-posix/libssp.dll.a /usr/lib/gcc/x86_64-w64-mingw32/10-posix/libssp-0.dll /usr/lib/gcc/x86_64-w64-mingw32/10-win32/libssp-0.dll /usr/lib/gcc/x86_64-w64-mingw32/10-win32/libssp.dll.a
    - git fetch --unshallow || echo 'already unshallow'
    - bash -c "make version && make app && make $TARGET && make desktop-$TARGET && make ci-upload-node-$TARGET -j$(nproc)"
  artifacts:
    reports:
      dotenv: .ci/build.env

build-linux-amd64:
  extends:
    - .build
  variables:
    TARGET: linux-amd64

build-linux-arm64:
  extends:
    - .build
  variables:
    TARGET: linux-arm64

build-windows-amd64:
  extends:
    - .build
  variables:
    TARGET: windows-amd64

build-darwin-arm64:
  extends:
    - .build
  variables:
    TARGET: darwin-arm64

build-darwin-amd64:
  extends:
    - .build
  variables:
    TARGET: darwin-amd64

leak-test-viewers:
  stage: build
  interruptible: true
  needs:
    - job: build-linux-amd64
      artifacts: true
    - job: build-bunny
  image:
    name: "$DOCKER_REPO:bunny"
  variables:
    SP_WIDE_OPEN: "true"
    SP_NO_FIREHOSE: "true"
    SP_WHIP_TEST: "--file=/bunny.mp4 --count=1 --viewers=50 --duration=5m"
    KUBERNETES_MEMORY_REQUEST: "2Gi"
    KUBERNETES_MEMORY_LIMIT: "2Gi"
    GOGC: "20"
    GOMEMLIMIT: "2GiB"
  timeout: "10 minutes"
  allow_failure: true
  script:
    - /bunny.sh

leak-test-streamers:
  stage: build
  interruptible: true
  needs:
    - job: build-linux-amd64
      artifacts: true
    - job: build-bunny
  image:
    name: "$DOCKER_REPO:bunny"
  variables:
    SP_WIDE_OPEN: "true"
    SP_NO_FIREHOSE: "true"
    SP_WHIP_TEST: "--file=/bunny.mp4 --count=10 --duration=5m"
    KUBERNETES_MEMORY_REQUEST: "2Gi"
    KUBERNETES_MEMORY_LIMIT: "2Gi"
    GOGC: "20"
    GOMEMLIMIT: "2GiB"
  timeout: "10 minutes"
  allow_failure: true
  script:
    - /bunny.sh

test:
  stage: build
  interruptible: true
  image: "$DOCKER_REPO:builder-$DOCKERFILE_HASH"
  timeout: 2 hours
  variables:
    STREAMPLACE_IGNORE_LEAKS: "true"
    STREAMPLACE_TEST_COUNT: "1"
  script:
    - git fetch --unshallow || echo 'already unshallow'
    - make ci-test -j$(nproc) && make ci-lexicons

build-docker-mistserver:
  stage: build
  interruptible: true
  needs:
    - job: build-linux-amd64
      artifacts: true
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  timeout: 2 hours
  script:
    - mkdir -p /kaniko/.docker
    - cp "$DOCKER_AUTH_CONFIG" /kaniko/.docker/config.json
    - /kaniko/executor
      --build-arg TARGETARCH=amd64
      --build-arg STREAMPLACE_URL=$STREAMPLACE_URL_LINUX_AMD64
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/mistserver.Dockerfile"
      --destination "$DOCKER_REPO:$STREAMPLACE_BRANCH-mistserver"
      --destination "$DOCKER_REPO:$STREAMPLACE_VERSION-mistserver"

build-docker-amd64:
  stage: build
  interruptible: true
  needs:
    - job: build-linux-amd64
      artifacts: true
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  timeout: 2 hours
  script:
    - mkdir -p /kaniko/.docker
    - cp "$DOCKER_AUTH_CONFIG" /kaniko/.docker/config.json
    - /kaniko/executor
      --build-arg TARGETARCH=amd64
      --build-arg STREAMPLACE_URL=$STREAMPLACE_URL_LINUX_AMD64
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/release.Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$STREAMPLACE_BRANCH-amd64"
      --destination "$CI_REGISTRY_IMAGE:$STREAMPLACE_VERSION-amd64"
      --destination "$DOCKER_REPO:$STREAMPLACE_BRANCH-amd64"
      --destination "$DOCKER_REPO:$STREAMPLACE_VERSION-amd64"

build-docker-arm64:
  stage: build
  interruptible: true
  tags:
    - linux
    - arm64
  needs:
    - job: build-linux-arm64
      artifacts: true
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  timeout: 2 hours
  script:
    - mkdir -p /kaniko/.docker
    - cp "$DOCKER_AUTH_CONFIG" /kaniko/.docker/config.json
    - /kaniko/executor
      --build-arg TARGETARCH=arm64
      --build-arg STREAMPLACE_URL=$STREAMPLACE_URL_LINUX_ARM64
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/release.Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$STREAMPLACE_BRANCH-arm64"
      --destination "$CI_REGISTRY_IMAGE:$STREAMPLACE_VERSION-arm64"
      --destination "$DOCKER_REPO:$STREAMPLACE_BRANCH-arm64"
      --destination "$DOCKER_REPO:$STREAMPLACE_VERSION-arm64"
      --customPlatform=linux/arm64

build-docker-manifest:
  stage: build
  interruptible: true
  image:
    name: curlimages/curl:latest
    entrypoint: [""]
  needs:
    - job: build-docker-arm64
    - job: build-docker-amd64
    - job: build-linux-amd64 # just for the environment variables
      artifacts: true
  before_script:
    - curl -s -L https://github.com/estesp/manifest-tool/releases/download/v2.1.7/binaries-manifest-tool-2.1.7.tar.gz | tar xvz
    - mv manifest-tool-linux-amd64 ./manifest-tool
    - chmod +x ./manifest-tool
  timeout: 2 hours
  script:
    - ./manifest-tool --username "${CI_REGISTRY_USER}" --password "${CI_REGISTRY_PASSWORD}" push from-args
      --platforms linux/amd64,linux/arm64
      --template $CI_REGISTRY_IMAGE:$STREAMPLACE_VERSION-ARCH
      --tags $STREAMPLACE_BRANCH
      --target $CI_REGISTRY_IMAGE:$STREAMPLACE_VERSION

.build-android:
  stage: build
  interruptible: true
  image: "$DOCKER_REPO:builder-$DOCKERFILE_HASH"
  timeout: 2 hours
  script:
    - git fetch --unshallow || echo 'already unshallow'
    - make $TARGET -j$(nproc)

build-android-debug:
  extends:
    - .build-android
  variables:
    TARGET: ci-android-debug

build-android-release:
  extends:
    - .build-android
  variables:
    TARGET: ci-android-release

.build-on-mac:
  stage: build
  interruptible: true
  image: macos-sonoma-xcode-big
  tags:
    - tart-installed
  variables:
    STREAMPLACE_IGNORE_LEAKS: "true"
    STREAMPLACE_TEST_COUNT: "1"
    NODE_OPTIONS: "--max_old_space_size=4096"
  timeout: 2 hours
  script:
    # workaround for https://gitlab.com/gitlab-org/gitlab/-/issues/501457
    # which is a workaround for ios builds failing due to /tmp vs /private/tmp weirdness
    - cd ..
    - mv streamplace /Users/admin/streamplace
    - cd /Users/admin/streamplace
    - git fetch --unshallow || echo 'already unshallow'
    - brew install ninja go openssl@3 && go version
    - export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
    - brew install node@22
    - node --version
    - npm install -g corepack@latest --force
    - corepack enable
    - sudo gem uninstall xcodeproj -x --ignore-dependencies
    - sudo gem install xcodeproj -v 1.25.1
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rustup.sh && bash rustup.sh -y && rm rustup.sh
    - export PATH="$PATH:$HOME/.cargo/bin"
    - echo $PATH
    - 'echo "which xcodeproj: $(which xcodeproj)"'
    - 'echo "xcodeproj --version: $(xcodeproj --version)"'
    - "$(which xcodeproj) --version"
    - >
      export GOTOOLCHAIN=go1.24.2
      && python3 -m pip install virtualenv
      && python3 -m virtualenv ~/venv
      && source ~/venv/bin/activate
      && python3 -m pip install meson
      && ${=COMMAND}
    # ^^ zsh-ism for running command with spaces

build-ios:
  extends:
    - .build-on-mac
  variables:
    COMMAND: make ci-ios -j16

build-desktop-darwin:
  extends:
    - .build-on-mac
  needs:
    - build-darwin-amd64
    - build-darwin-arm64
  variables:
    COMMAND: make ci-desktop-darwin

windows-selftest:
  interruptible: true
  stage: build
  # for the moment...
  tags:
    - windows
  timeout: 2 hours
  needs:
    - job: build-windows-amd64
      artifacts: true
  variables:
    MSYSTEM: "MINGW32"
    CHERE_INVOKING: "yes"
  script:
    - C:\msys64\usr\bin\bash -lc "bash -x ./util/windows-selftest.sh $STREAMPLACE_DESKTOP_URL_WINDOWS_AMD64"

.release-template:
  stage: build
  interruptible: true
  image: "$DOCKER_REPO:builder-$DOCKERFILE_HASH"
  needs:
    - build-darwin-amd64
    - build-darwin-arm64
    - build-android-debug
    - build-android-release
    - build-docker-amd64
    - build-docker-arm64
    - build-docker-manifest
    - build-desktop-darwin
    - test
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'
  timeout: 2 hours

npm-release:
  extends:
    - .release-template
  script:
    - make ci-npm-release

release:
  extends:
    - .release-template
  script:
    - make ci-release

.report-status:
  tags:
    - tiny-job
  interruptible: true
  image:
    name: curlimages/curl
    entrypoint: [""]
  variables:
    STATUS_PROJECT: streamplace/streamplace
    STATUS_NAME: git.stream.place
  script:
    # For complete details on the GitHub API please see:
    # https://developer.github.com/v3/repos/statuses
    - >
      set -eu && curl -L
      --fail-with-body
      --silent
      -X POST
      -H "Accept: application/vnd.github+json"
      -H "Authorization: Bearer $GITHUB_TOKEN"
      -H "X-GitHub-Api-Version: 2022-11-28"
      https://api.github.com/repos/${STATUS_PROJECT}/statuses/${CI_COMMIT_SHA}
      -d '{"state":"'${CI_JOB_NAME}'","target_url":"'${CI_PIPELINE_URL}'","description":"'${STATUS_NAME}'","context":"'${STATUS_NAME}'"}'
  environment:
    name: reporting-github
  dependencies: []

pending:
  stage: .pre
  extends:
    - .report-status

success:
  stage: .post
  extends:
    - .report-status

failure:
  stage: .post
  extends:
    - .report-status
  rules:
    - when: on_failure
