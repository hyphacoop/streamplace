name: build

on:
  pull_request:
  push:
    branches:
      - next

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linux:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            cmd: >-
              make && (make test || make test) && make check && make ci-lexicons
          - name: linux-arm64
            cmd: "make app && make linux-arm64"
          - name: windows-amd64
            cmd: "make app && make windows-amd64"
    steps:
      - name: Check out code
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: make node
        run: |
          sudo apt install podman -y
          make in-container DOCKER_OPTS="-e STREAMPLACE_IGNORE_LEAKS=true -e STREAMPLACE_TEST_COUNT=1 -e CI=true" IN_CONTAINER_CMD="${{ matrix.cmd }}"

  darwin:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - name: darwin-arm64
            runs-on: macos-latest
            cmd: make && make test && make check
          - name: darwin-amd64
            runs-on: macos-13
            cmd: make
    steps:
      - name: Check out code
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build Streamplace
        env:
          STREAMPLACE_TEST_COUNT: "1"
          STREAMPLACE_IGNORE_LEAKS: "true"
        run: |
          export GOTOOLCHAIN=go1.24.2 \
          && brew install go \
          && python -m pip install virtualenv \
          && python -m virtualenv ~/venv \
          && source ~/venv/bin/activate \
          && python -m pip install meson \
          && ${{ matrix.cmd }}
